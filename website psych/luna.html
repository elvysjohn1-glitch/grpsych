<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna AI | PsychoFlow</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-50 to-teal-50 app-bg">

<nav class="bg-pink-600 text-white p-4 flex justify-between items-center shadow-lg">
    <div class="font-bold text-xl">PsychoFlow</div>
    <div class="space-x-4 flex">
        <a href="index.html" class="hover:bg-pink-700 px-3 py-2 rounded">Dashboard</a>
        <a href="contribution.html" class="hover:bg-pink-700 px-3 py-2 rounded">Contribute</a>
        <a href="statistics.html" class="hover:bg-pink-700 px-3 py-2 rounded">Statistics</a>
        <a href="luna.html" class="hover:bg-pink-700 px-3 py-2 rounded">Luna AI</a>
        <a href="login.html" class="hover:bg-pink-700 px-3 py-2 rounded">Logout</a>
    </div>
</nav>

<div class="max-w-2xl mx-auto p-8">
    <div class="bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-3xl font-bold text-pink-600 mb-2">Luna AI Companion</h1>
        <p class="text-gray-600 mb-6">Your personal AI assistant for mental health support and guidance.</p>

        <div id="chat-box" class="bg-gray-100 rounded-lg p-4 mb-4 h-96 overflow-y-auto border border-gray-300">
            <div class="text-center text-gray-500 py-20">
                <p>Start a conversation with Luna!</p>
            </div>
        </div>

        <div class="flex gap-2">
            <input type="text" id="messageInput" placeholder="Type your message..." 
                class="flex-1 p-3 border rounded-lg focus:outline-none focus:border-pink-600">
            <button onclick="sendMessage()" class="bg-pink-600 text-white px-6 py-3 rounded-lg hover:bg-pink-700">
                Send
            </button>
        </div>
    </div>
</div>

<script>
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        if (message) {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += '<div class="my-2 text-right"><span class="bg-pink-600 text-white p-2 rounded inline-block">' + message + '</span></div>';
            chatBox.scrollTop = chatBox.scrollHeight;
            input.value = '';
            
            // Simulate Luna response
            setTimeout(() => {
                chatBox.innerHTML += '<div class="my-2 text-left"><span class="bg-gray-300 p-2 rounded inline-block">Thank you for sharing. Luna is here to listen and support you. How can I help you today?</span></div>';
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);
        }
    }
    
    document.getElementById('messageInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
