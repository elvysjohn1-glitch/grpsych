<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a Contribution</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .contribution-section {
            margin: 30px 0;
        }
        .preset-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        button.confirm {
            background-color: #008CBA;
            margin-top: 20px;
            width: 100%;
        }
        .custom-amount {
            margin: 20px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }
        .amount-display {
            font-size: 18px;
            font-weight: bold;
            color: #008CBA;
        }
    </style>
</head>
<body class="app-bg">
    <h1>Make a Contribution</h1>
    <div id="recipientBanner" style="display:none; background:#ffe4e1; padding:10px; margin-bottom:15px; border:1px solid #ff7f7f;">
        <strong>You are contributing for: </strong><span id="recipientName"></span>
    </div>
    
    <div class="contribution-section">
        <label for="currencySelect">Currency:</label>
        <select id="currencySelect" onchange="updatePresetLabels();" class="mb-4 p-2 border rounded">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="KES">KES</option>
            <option value="GBP">GBP</option>
        </select>
    </div>

    <div class="contribution-section">
        <h2>Select a Preset Amount:</h2>
        <div id="presetButtons" class="preset-buttons">
            <button onclick="selectAmount(5, '1 Month')" data-amount="5" data-label="1 Month">5 – 1 Month</button>
            <button onclick="selectAmount(15, '3 Months')" data-amount="15" data-label="3 Months">15 – 3 Months</button>
            <button onclick="selectAmount(50, '1 Year')" data-amount="50" data-label="1 Year">50 – 1 Year</button>
        </div>
    </div>

    <div class="contribution-section custom-amount">
        <h2>Or Enter a Custom Amount:</h2>
        <label for="donationAmount">Donation Amount: <span id="amountDisplay">5</span> <span id="currencyDisplay">USD</span></label>
        <input type="number" id="donationAmount" min="1" step="0.01" value="5"
               class="w-full mb-4 p-2 border rounded"
               oninput="updateAmount(this.value)" placeholder="Enter amount">
    </div>

    <div class="contribution-section">
        <label for="paymentMethod">Payment Method:</label>
        <select id="paymentMethod" class="mb-4 p-2 border rounded" onchange="showPaymentFields()">
            <option value="mpesa">MPESA (Push STK)</option>
            <option value="paypal">PayPal</option>
            <option value="bank">Bank Transfer</option>
        </select>
    </div>

    <div id="paymentDetails" class="contribution-section"></div>

    <button class="confirm" onclick="confirmDonation()" id="payButton">Pay Now</button>

    <script>
        const currencySymbols = {
            USD: '$',
            EUR: '€',
            KES: 'KSh',
            GBP: '£'
        };

        function selectAmount(amount, label) {
            document.getElementById('donationAmount').value = amount;
            updateAmount(amount);
        }

        function updateAmount(value) {
            document.getElementById('amountDisplay').textContent = value;
            const currency = document.getElementById('currencySelect').value;
            document.getElementById('currencyDisplay').textContent = currency;
        }

        function updatePresetLabels() {
            const currency = document.getElementById('currencySelect').value;
            const symbol = currencySymbols[currency] || '';
            document.getElementById('currencyDisplay').textContent = currency;

            document.querySelectorAll('#presetButtons button').forEach(btn => {
                const amt = btn.getAttribute('data-amount');
                const lab = btn.getAttribute('data-label');
                btn.textContent = symbol + amt + ' – ' + lab;
            });

            updateAmount(document.getElementById('donationAmount').value);
        }

        function showPaymentFields() {
            const method = document.getElementById('paymentMethod').value;
            const container = document.getElementById('paymentDetails');
            container.innerHTML = '';
            if (method === 'mpesa') {
                container.innerHTML = `<label for="phone">Phone Number (MPESA):</label>
                    <input type="tel" id="phone" placeholder="2547XXXXXXXX" class="w-full mb-4 p-2 border rounded" required>`;
            } else if (method === 'paypal') {
                container.innerHTML = `<label for="paypalEmail">PayPal Email:</label>
                    <input type="email" id="paypalEmail" placeholder="you@example.com" class="w-full mb-4 p-2 border rounded" required>`;
            } else if (method === 'bank') {
                container.innerHTML = `<label for="bankSelect">Select Bank:</label>
                    <select id="bankSelect" class="w-full mb-4 p-2 border rounded" required>
                        <optgroup label="Main Kenyan Banks">
                            <option value="equity">Equity Bank</option>
                            <option value="kcb">KCB</option>
                            <option value="absa">Absa Bank</option>
                            <option value="cooperative">Co-operative Bank</option>
                            <option value="stanbic">Stanbic Bank</option>
                        </optgroup>
                        <optgroup label="Worldwide Banks">
                            <option value="hsbc">HSBC</option>
                            <option value="citi">Citi Bank</option>
                            <option value="barclays">Barclays</option>
                            <option value="wellsfargo">Wells Fargo</option>
                            <option value="chase">Chase</option>
                            <option value="boa">Bank of America</option>
                            <option value="dbs">DBS</option>
                            <option value="scotiabank">Scotiabank</option>
                            <option value="rbc">RBC</option>
                            <option value="ubs">UBS</option>
                            <option value="bbva">BBVA</option>
                            <option value="sbi">State Bank of India</option>
                            <option value="santander">Santander</option>
                            <option value="pnb">PNB</option>
                            <option value="uniCredit">UniCredit</option>
                            <option value="creditagricole">Crédit Agricole</option>
                            <option value="rabobank">Rabobank</option>
                            <option value="anz">ANZ</option>
                        </optgroup>
                    </select>
                    <label for="cardNumber">Card/Account Number:</label>
                    <input type="text" id="cardNumber" placeholder="XXXX-XXXX-XXXX-XXXX" class="w-full mb-4 p-2 border rounded" required>`;
            }
        }

        function confirmDonation() {
            const amount = document.getElementById('donationAmount').value;
            const currency = document.getElementById('currencySelect').value;
            const method = document.getElementById('paymentMethod').value;
            const symbol = currencySymbols[currency] || '';

            if (method === 'mpesa') {
                const phoneEl = document.getElementById('phone');
                const phone = phoneEl ? phoneEl.value.trim() : '';
                if (!phone) {
                    alert('Please enter your phone number to proceed with MPESA payment.');
                    phoneEl && phoneEl.focus();
                    return;
                }
                alert(`Initiating MPESA STK push for ${symbol}${amount} ${currency} to ${phone}...`);
            } else if (method === 'paypal') {
                const emailEl = document.getElementById('paypalEmail');
                const email = emailEl ? emailEl.value.trim() : '';
                if (!email) {
                    alert('Please enter your PayPal email to continue.');
                    emailEl && emailEl.focus();
                    return;
                }
                alert(`Redirecting to PayPal to pay ${symbol}${amount} ${currency} using ${email}...`);
            } else if (method === 'bank') {
                const bankEl = document.getElementById('bankSelect');
                const cardEl = document.getElementById('cardNumber');
                const bank = bankEl ? bankEl.value : '';
                const card = cardEl ? cardEl.value.trim() : '';
                if (!bank) {
                    alert('Please select your bank before proceeding.');
                    bankEl && bankEl.focus();
                    return;
                }
                if (!card) {
                    alert('Please enter your card or account number to continue.');
                    cardEl && cardEl.focus();
                    return;
                }
                alert(`Processing bank payment of ${symbol}${amount} ${currency} via ${bank}, card/account ${card}...`);
            }
        }

        // parse query parameters
        function getQueryParams() {
            const params = {};
            location.search.substring(1).split('&').forEach(pair => {
                const [key, value] = pair.split('=');
                if (key) params[decodeURIComponent(key)] = decodeURIComponent(value || '');
            });
            return params;
        }

        function showRecipient() {
            const qs = getQueryParams();
            if (qs.recipient) {
                document.getElementById('recipientName').textContent = qs.recipient;
                document.getElementById('recipientBanner').style.display = 'block';
            }
        }

        // initialize labels on load
        document.addEventListener('DOMContentLoaded', () => {
            updatePresetLabels();
            showRecipient();
            showPaymentFields();
        });
    </script>
</body>
</html>
