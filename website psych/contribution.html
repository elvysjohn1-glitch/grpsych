<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a Contribution</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .contribution-section {
            margin: 30px 0;
        }
        .preset-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        button.confirm {
            background-color: #008CBA;
            margin-top: 20px;
            width: 100%;
        }
        .custom-amount {
            margin: 20px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }
        .amount-display {
            font-size: 18px;
            font-weight: bold;
            color: #008CBA;
        }
    </style>
</head>
<body>
    <h1>Make a Contribution</h1>
    
    <div class="contribution-section">
        <h2>Select a Preset Amount:</h2>
        <div class="preset-buttons">
            <button onclick="selectAmount(5)">$5 – 1 Month</button>
            <button onclick="selectAmount(15)">$15 – 3 Months</button>
            <button onclick="selectAmount(50)">$50 – 1 Year</button>
        </div>
    </div>

    <div class="contribution-section custom-amount">
        <h2>Or Choose a Custom Amount:</h2>
        <label for="donationRange">Donation Amount: $<span id="amountDisplay">5</span></label>
        <input type="range" id="donationRange" min="5" max="500" value="5" oninput="updateAmount(this.value)">
    </div>

    <button class="confirm" onclick="confirmDonation()">Confirm Donation</button>

    <script>
        function selectAmount(amount) {
            document.getElementById('donationRange').value = amount;
            updateAmount(amount);
        }

        function updateAmount(value) {
            document.getElementById('amountDisplay').textContent = value;
        }

        function confirmDonation() {
            const amount = document.getElementById('donationRange').value;
            alert('Thank you for your donation of $' + amount + '!');
            // Add payment processing logic here
        }
    </script>
</body>
</html>
